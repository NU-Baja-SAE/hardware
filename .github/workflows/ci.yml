name: Hardware CI

on:
  push:
    paths:
      - "boards/**"
      - "libraries/**"
      - "bom/**"
      - "harness/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "boards/**"
      - "libraries/**"
      - "bom/**"
      - "harness/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The kicad/kicad:9.0 container image used below should match the team
# standard KiCad version in the top-level README ("KiCad version" section).
# Bump every job's image and the README together.

jobs:
  erc-drc:
    name: ERC / DRC
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: kicad/kicad:9.0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      # The kicad container image has no bash, so these steps run under plain
      # sh: no globstar/arrays -- use find, and keep everything POSIX.
      - name: ERC on every board schematic
        run: |
          mkdir -p reports
          status=0
          for pro in $(find boards -type f -name '*.kicad_pro' | sort); do
            case "$pro" in *backup*|*-bak*|*_autosave-*) continue ;; esac
            sch="${pro%.kicad_pro}.kicad_sch"
            [ -f "$sch" ] || continue
            board="$(basename "$(dirname "$pro")")"
            echo "::group::ERC: $sch"
            kicad-cli sch erc --severity-error --exit-code-violations \
              -o "reports/${board}-erc.rpt" "$sch" || status=1
            cat "reports/${board}-erc.rpt" || true
            echo "::endgroup::"
          done
          exit "$status"

      - name: DRC on every board layout
        if: ${{ !cancelled() }}
        run: |
          mkdir -p reports
          status=0
          for pro in $(find boards -type f -name '*.kicad_pro' | sort); do
            case "$pro" in *backup*|*-bak*|*_autosave-*) continue ;; esac
            pcb="${pro%.kicad_pro}.kicad_pcb"
            [ -f "$pcb" ] || continue
            board="$(basename "$(dirname "$pro")")"
            echo "::group::DRC: $pcb"
            kicad-cli pcb drc --severity-error --exit-code-violations \
              -o "reports/${board}-drc.rpt" "$pcb" || status=1
            cat "reports/${board}-drc.rpt" || true
            echo "::endgroup::"
          done
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erc-drc-reports
          path: reports/
          if-no-files-found: ignore

  passive-footprint-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check resistor/capacitor footprint sizes
        run: python3 libraries/tools/check_passive_footprints.py boards

  trace-width-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check netclass minimum trace widths
        run: python3 libraries/tools/check_trace_widths.py boards

  render-artifacts:
    name: Schematic / PCB renders
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: kicad/kicad:9.0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      # No bash in the kicad image -- POSIX sh only (see erc-drc job).
      - name: Render schematic PDFs and PCB layer SVGs
        run: |
          mkdir -p render
          status=0
          for pro in $(find boards -type f -name '*.kicad_pro' | sort); do
            case "$pro" in *backup*|*-bak*|*_autosave-*) continue ;; esac
            board="$(basename "$(dirname "$pro")")"
            sch="${pro%.kicad_pro}.kicad_sch"
            pcb="${pro%.kicad_pro}.kicad_pcb"
            if [ -f "$sch" ]; then
              echo "::group::Schematic PDF: $sch"
              kicad-cli sch export pdf -o "render/${board}-schematic.pdf" "$sch" || status=1
              echo "::endgroup::"
            fi
            if [ -f "$pcb" ]; then
              echo "::group::PCB SVGs: $pcb"
              kicad-cli pcb export svg --mode-single -o "render/${board}-front.svg" \
                --layers "F.Cu,F.SilkS,F.Mask,Edge.Cuts" \
                --page-size-mode 2 --exclude-drawing-sheet "$pcb" || status=1
              kicad-cli pcb export svg --mode-single -o "render/${board}-back.svg" \
                --layers "B.Cu,B.SilkS,B.Mask,Edge.Cuts" \
                --page-size-mode 2 --exclude-drawing-sheet --mirror "$pcb" || status=1
              echo "::endgroup::"
            fi
          done
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: board-renders
          path: render/
          if-no-files-found: warn

  bom:
    name: Consolidated BOM
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # On PRs the committed CSV must already match what the schematics
      # produce, so the file history stays truthful and reviewable.
      - name: Check committed BOM is up to date (PRs)
        if: github.event_name == 'pull_request'
        run: python3 bom/scripts/generate_bom.py --check

      - name: Regenerate consolidated BOM
        run: python3 bom/scripts/generate_bom.py

      - name: Post BOM diff vs. base branch to the job summary (PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "${{ github.base_ref }}"
          {
            echo "### Consolidated BOM changes vs. \`${{ github.base_ref }}\`"
            if git diff --quiet "origin/${{ github.base_ref }}" -- bom/consolidated-bom.csv; then
              echo "_No BOM changes._"
            else
              echo '```diff'
              git diff "origin/${{ github.base_ref }}" -- bom/consolidated-bom.csv
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Safety net for direct pushes to main (e.g. schematic edits committed
      # without regenerating): keep the committed CSV in sync automatically.
      # "[skip ci]" stops the bot commit from retriggering this workflow.
      - name: Auto-commit regenerated BOM (pushes to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- bom/consolidated-bom.csv; then
            echo "Committed BOM already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bom/consolidated-bom.csv
          git commit -m "Auto-regenerate consolidated BOM [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        with:
          name: consolidated-bom
          path: bom/consolidated-bom.csv

  interactive-html-bom:
    name: Interactive HTML BOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: kicad/kicad:9.0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openscopeproject/InteractiveHtmlBom
          ref: v2.11.2
          path: .ibom

      # No bash in the kicad image -- POSIX sh only (see erc-drc job).
      - name: Generate interactive HTML BOM per board
        env:
          INTERACTIVE_HTML_BOM_NO_DISPLAY: "1"
        run: |
          mkdir -p ibom-output
          status=0
          for pcb in $(find boards -type f -name '*.kicad_pcb' | sort); do
            case "$pcb" in *backup*|*-bak*|*_autosave-*) continue ;; esac
            board="$(basename "$(dirname "$pcb")")"
            echo "::group::Interactive BOM: $pcb"
            python3 .ibom/InteractiveHtmlBom/generate_interactive_bom.py \
              --no-browser \
              --dest-dir "$GITHUB_WORKSPACE/ibom-output" \
              --name-format "${board}-ibom" \
              "$pcb" || status=1
            echo "::endgroup::"
          done
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: interactive-html-bom
          path: ibom-output/
          if-no-files-found: warn

  harness-render:
    name: Harness diagram
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    # Needs kicad-cli (for extract_connectors.py) so it runs in the KiCad
    # container like the other kicad jobs. No bash in this image -- POSIX sh
    # only (see the erc-drc job).
    container:
      image: kicad/kicad:9.0
      options: --user root
    steps:
      - uses: actions/checkout@v4

      # This job runs inside the kicad container as root, but the workspace is
      # checked out owned by the runner user. Git then refuses every command
      # here with "detected dubious ownership" / "fatal: not in a git
      # directory" (see the git diff / config / push steps below). Mark the
      # workspace safe so all later git commands work.
      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Skip cleanly until there's a backbone to render.
      - name: Bail out if no harness backbone yet
        id: guard
        run: |
          if [ ! -f harness/car.yaml ]; then
            echo "No harness/car.yaml yet - nothing to render."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      # The KiCad image ships kicad-cli/python3/git but NOT pip (and strips
      # ensurepip too -- it's a Debian image where pip comes from apt). Fail
      # loudly with an actionable message if a genuinely-required tool is
      # missing rather than letting a later step die cryptically.
      - name: Pre-flight - required tools present
        if: steps.guard.outputs.skip == '0'
        run: |
          missing=""
          for t in kicad-cli python3 git; do
            command -v "$t" >/dev/null 2>&1 || missing="$missing $t"
          done
          if [ -n "$missing" ]; then
            echo "harness-render: missing required tool(s):$missing" >&2
            echo "The kicad/kicad:9.0 image is expected to provide these." >&2
            exit 1
          fi

      # The harness build needs pydantic + PyYAML. The KiCad image has no pip
      # (and no ensurepip -- pip comes from apt on this Debian image). Install
      # only what's actually missing: if the bundled Python already has both,
      # skip pip entirely; otherwise apt-install pip and pull them. ruamel.yaml
      # isn't needed -- only the interactive editor uses it.
      - name: Install harness build dependencies
        if: steps.guard.outputs.skip == '0'
        run: |
          if python3 -c "import pydantic, yaml" 2>/dev/null; then
            echo "pydantic + PyYAML already available; skipping pip."
          else
            apt-get update -qq
            apt-get install -y -qq python3-pip
            # --break-system-packages is needed on PEP-668 (externally-managed)
            # pythons but rejected by older pip; try with, fall back to without.
            python3 -m pip install --quiet --break-system-packages \
              -r harness/wirelab/requirements-build.txt \
              || python3 -m pip install --quiet \
                 -r harness/wirelab/requirements-build.txt
          fi
          python3 -c "import pydantic, yaml; print('deps OK:', pydantic.VERSION)"

      # 1. Regenerate each board's off-board connectors from its KiCad
      #    schematic. 2. Build the whole-car diagram from the hand-maintained
      #    backbone. Output SVG lands in harness/output/.
      - name: Smoke-test the harness pipeline
        if: steps.guard.outputs.skip == '0'
        run: python3 harness/scripts/test_pipeline.py

      - name: Extract connectors and build harness diagram
        if: steps.guard.outputs.skip == '0'
        run: |
          python3 harness/scripts/extract_connectors.py
          mkdir -p harness/output
          python3 harness/wirelab/cli.py build harness/car.yaml -o harness/output/car.svg

      # On PRs the committed generated YAML must already match what the
      # schematics produce -- that's the harness DATA, and stale data means a
      # wrong diagram, so this is a hard failure.
      #
      # The rendered car.svg is NOT hard-checked: its exact bytes depend on the
      # renderer/host (float rounding, element ordering) so a locally-built SVG
      # differs from the container's even when the harness is identical. Failing
      # on that just blocks merges for a cosmetic diff. We only WARN, and the
      # push-to-main step below regenerates the canonical SVG anyway.
      - name: Check committed harness files are up to date (PRs)
        if: steps.guard.outputs.skip == '0' && github.event_name == 'pull_request'
        run: |
          python3 harness/scripts/extract_connectors.py --check
          if ! git diff --quiet -- harness/output/car.svg; then
            echo "::warning::harness/output/car.svg differs from a fresh build" \
                 "(likely renderer/host byte differences). It will be" \
                 "regenerated on merge to main; not failing the PR." >&2
            git diff --stat -- harness/output/car.svg >&2
          fi

      # Safety net for direct pushes to main: keep the committed generated
      # connector YAML + diagram in sync automatically. "[skip ci]" stops the
      # bot commit from retriggering this workflow. Mirrors the BOM job.
      - name: Auto-commit regenerated harness (pushes to main)
        if: steps.guard.outputs.skip == '0' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- harness/generated harness/output/car.svg; then
            echo "Committed harness already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add harness/generated harness/output/car.svg
          git commit -m "Auto-regenerate harness diagram [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-diagram
          path: |
            harness/output/
            !harness/output/.gitkeep
          if-no-files-found: ignore
